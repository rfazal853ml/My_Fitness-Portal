{% if not roles %}
<div class="col-span-3 text-center py-16 text-[#94b1d2]">
    <p class="text-sm font-medium">No roles found matching your search.</p>
</div>
{% else %}
{% for role in roles %}
<div class="bg-[#1A2236] rounded-2xl p-6 flex flex-col gap-5 shadow-[0_22px_50px_rgba(6,15,32,0.30)]">
    <h3 class="text-white font-bold text-lg capitalize tracking-tight">{{ role.name }}</h3>

    <div class="bg-[#0b182d] rounded-2xl p-4">
        <p class="text-[#94b1d2] text-xs font-bold uppercase tracking-wider mb-4">Privileges</p>
        <div class="space-y-3">
            {% for module, actions in role.permissions.items() %}
            <div class="flex items-center justify-between gap-4 text-sm">
                <div class="flex items-center gap-2 text-white font-medium">
                    <svg class="w-4 h-4 text-[#000000] flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                    </svg>
                    <span class="capitalize">{{ module }}</span>
                </div>
                <span class="text-[#94b1d2] text-xs font-medium capitalize">{{ actions | join(', ') }}</span>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 pt-4 border border-gray-700 mt-auto">
        <button onclick="openEditRole('{{ role.id }}', '{{ role.name }}', '{{ role.description }}', '{{ role.permission_ids | join(',') }}')"
                class="flex-1 flex items-center justify-center gap-2 text-[#94b1d2] border border-gray-700 hover:bg-[#41C2EF]/90 hover:text-white py-3 rounded-2xl text-sm font-semibold transition-all">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
            Edit
        </button>
        <form method="POST" action="/users/roles/delete/{{ role.id }}"
              onsubmit="return confirmAction(this, 'Delete role {{ role.name }}? This cannot be undone.')" class="flex-shrink-0">
            <button type="submit"
                    class="flex h-11 w-full items-center justify-center rounded-2xl border border-red-500/20 bg-[#091425]
                           text-red-400 hover:bg-red-500/10 transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
                Delete
            </button>
        </form>
    </div>
</div>
{% endfor %}
{% endif %}
