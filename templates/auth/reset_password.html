<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ gym_name }}</title>
    <link rel="icon" type="image/png" href="/static/images/logo.png">
    <link rel="stylesheet" href="/static/css/output.css">
    <style>
        .gym-bg {
            background-image: url('/static/images/image.png');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="min-h-screen flex bg-[#0a1628]">

    <!-- Left: Gym Photo -->
    <div class="hidden lg:block lg:w-1/2 gym-bg relative">
        <div class="absolute inset-0 bg-black/55"></div>
    </div>

    <!-- Right: Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-[#0d1b2e]">
        <div class="w-full max-w-md">

            <!-- Logo -->
            <div class="flex items-center gap-3 mb-10">
                <img src="/static/images/logo.png" alt="Gym25 Logo" class="w-12 h-12 object-contain">
                <span class="text-white text-3xl font-bold tracking-tight">
                    Gym<span class="text-[#41c2ef]">25</span>
                </span>
            </div>

            <h1 class="text-white text-3xl font-bold mb-2">Set new Password</h1>
            <p class="text-gray-400 text-sm mb-8">
                Your new password must be different to previously used password.
            </p>

            <!-- Error -->
            {% if error %}
            <div class="bg-red-500/15 border border-red-500/40 text-red-400 
                        px-4 py-3 rounded-xl mb-5 text-sm">
                ✕ {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/auth/reset-password" class="space-y-5" id="reset-form">
                <input type="hidden" name="user_id" value="{{ user_id }}">
                <input type="hidden" name="otp_id"  value="{{ otp_id }}">

                <!-- New Password -->
                <div>
                    <label class="block text-gray-300 text-sm font-medium mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2">
                            <svg class="w-5 h-5 text-[#41c2ef]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </span>
                        <input type="password" name="new_password" id="new_password" required
                               placeholder="Enter Your Password"
                               minlength="8"
                               class="w-full bg-[#1a2942] text-gray-100 placeholder-gray-500
                                      pl-12 pr-12 py-3.5 rounded-xl border border-[#2a3a52]
                                      focus:outline-none focus:border-[#41c2ef] focus:ring-1
                                      focus:ring-[#41c2ef]/30 transition-colors text-sm">
                        <button type="button" onclick="togglePassword('new_password', 'eye1')"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
                            <svg id="eye1" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                <path id="eye1-slash" class="hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                    <!-- Strength indicator -->
                    <div class="mt-2 h-1 rounded-full bg-[#2a3a52] overflow-hidden">
                        <div id="strength-bar" class="h-full rounded-full transition-all duration-300 w-0"></div>
                    </div>
                    <p id="strength-text" class="text-xs text-gray-500 mt-1"></p>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-gray-300 text-sm font-medium mb-2">Confirm Password</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2">
                            <svg class="w-5 h-5 text-[#41c2ef]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </span>
                        <input type="password" name="confirm_password" id="confirm_password" required
                               placeholder="Enter Your Confirm Password"
                               class="w-full bg-[#1a2942] text-gray-100 placeholder-gray-500
                                      pl-12 pr-12 py-3.5 rounded-xl border border-[#2a3a52]
                                      focus:outline-none focus:border-[#41c2ef] focus:ring-1
                                      focus:ring-[#41c2ef]/30 transition-colors text-sm"
                               id="confirm_password">
                        <button type="button" onclick="togglePassword('confirm_password', 'eye2')"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
                            <svg id="eye2" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                <path id="eye2-slash" class="hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                    <p id="match-msg" class="text-xs mt-1 hidden"></p>
                </div>

                <!-- Save -->
                <button type="submit"
                        class="w-full bg-[#41c2ef] hover:bg-[#41c2ef]/90 active:bg-[#41c2ef]/80
                               text-gray-900 font-bold py-3.5 rounded-xl transition-colors
                               text-sm tracking-wide mt-2">
                    Save
                </button>

                <!-- Back to Login -->
                <a href="/auth/login"
                   class="block w-full border border-[#41c2ef]/40 hover:border-[#41c2ef] 
                          text-[#41c2ef] font-bold py-3.5 rounded-xl transition-colors 
                          text-sm text-center">
                    Back to Login
                </a>
            </form>
        </div>
    </div>

<script>
    // ── Toggle Password Visibility ───────────────────────────────────────────
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const slash = document.getElementById(`${iconId}-slash`);
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        slash?.classList.toggle('hidden', !isHidden);
    }

    // ── Password Strength ────────────────────────────────────────────────────
    const pwInput    = document.getElementById('new_password');
    const strengthBar  = document.getElementById('strength-bar');
    const strengthText = document.getElementById('strength-text');

    pwInput.addEventListener('input', () => {
        const pw = pwInput.value;
        let score = 0;
        if (pw.length >= 8)          score++;
        if (/[A-Z]/.test(pw))        score++;
        if (/[0-9]/.test(pw))        score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;

        const levels = [
            { width: '0%',   color: '',                text: '' },
            { width: '25%',  color: 'bg-red-500',      text: 'Weak' },
            { width: '50%',  color: 'bg-yellow-500',   text: 'Fair' },
            { width: '75%',  color: 'bg-blue-500',     text: 'Good' },
            { width: '100%', color: 'bg-green-500',    text: 'Strong' },
        ];
        const level = levels[score];
        strengthBar.className = `h-full rounded-full transition-all duration-300 ${level.color}`;
        strengthBar.style.width = level.width;
        strengthText.textContent = level.text;
        strengthText.className = `text-xs mt-1 ${score <= 1 ? 'text-red-400' : score === 2 ? 'text-yellow-400' : score === 3 ? 'text-blue-400' : 'text-green-400'}`;
    });

    // ── Confirm Match ────────────────────────────────────────────────────────
    const confirmInput = document.getElementById('confirm_password');
    const matchMsg     = document.getElementById('match-msg');

    confirmInput.addEventListener('input', () => {
        if (!confirmInput.value) {
            matchMsg.classList.add('hidden');
            return;
        }
        matchMsg.classList.remove('hidden');
        if (pwInput.value === confirmInput.value) {
            matchMsg.textContent = '✓ Passwords match';
            matchMsg.className = 'text-xs mt-1 text-green-400';
        } else {
            matchMsg.textContent = '✕ Passwords do not match';
            matchMsg.className = 'text-xs mt-1 text-red-400';
        }
    });
</script>

</body>
</html>
