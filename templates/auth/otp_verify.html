<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ gym_name }}</title>
    <link rel="stylesheet" href="/static/css/output.css">
    <style>
        .gym-bg {
            background-image: url('/static/images/image.png');
            background-size: cover;
            background-position: center;
        }

        /* OTP input boxes */
        .otp-input {
            width: 56px;
            height: 64px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            background: #1a2942;
            border: 2px solid #2a3a52;
            border-radius: 14px;
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s;
        }

        .otp-input:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15);
        }

        .otp-input.filled {
            border-color: #22d3ee;
        }
    </style>
</head>

<body class="min-h-screen flex bg-[#0a1628]">

    <!-- Left: Gym Photo -->
    <div class="hidden lg:block lg:w-1/2 gym-bg relative">
        <div class="absolute inset-0 bg-black/55"></div>
    </div>

    <!-- Right: OTP Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-[#0d1b2e]">
        <div class="w-full max-w-md">

            <!-- Logo -->
            <div class="flex items-center gap-3 mb-10">
                <img src="/static/images/logo.png" alt="Gym25 Logo" class="w-12 h-12 object-contain">
                <span class="text-white text-3xl font-bold tracking-tight">
                    Gym<span class="text-[#41c2ef]">25</span>
                </span>
            </div>

            <h1 class="text-white text-3xl font-bold mb-3">OTP Verification</h1>
            <p class="text-gray-400 text-sm mb-8">
                Please enter the OTP sent to your email address<br>to complete the forgot password process.
            </p>

            <!-- Success resent message -->
            {% if request.query_params.get('resent') %}
            <div class="bg-green-500/15 border border-green-500/40 text-green-400 
                        px-4 py-3 rounded-xl mb-5 text-sm">
                ✓ New OTP sent. Please check your email inbox.
            </div>
            {% endif %}

            <!-- Error -->
            {% if error %}
            <div class="bg-red-500/15 border border-red-500/40 text-red-400 
                        px-4 py-3 rounded-xl mb-5 text-sm">
                ✕ {{ error }}
            </div>
            {% endif %}

            <!-- OTP Inputs -->
            <div class="flex gap-3 mb-6" id="otp-container">
                <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="0">
                <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="1">
                <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="2">
                <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="3">
                <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="4">
            </div>

            <!-- Timer + Resend -->
            <div class="flex items-center justify-between mb-8 text-sm">
                <span class="text-gray-400">
                    Time Remaining : <span id="countdown" class="text-[#41c2ef] font-bold">10:00</span>
                </span>

                <form method="POST" action="/auth/resend-otp" id="resend-form">
                    <input type="hidden" name="user_id" value="{{ user_id }}">
                    <input type="hidden" name="email" value="{{ email }}">
                    <button type="submit" id="resend-btn" class="flex items-center gap-1.5 text-gray-500 hover:text-[#41c2ef] 
                                   transition-colors disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        Resend code
                    </button>
                </form>
            </div>

            <!-- Hidden form that submits the assembled OTP -->
            <form method="POST" action="/auth/otp-verify" id="otp-form">
                <input type="hidden" name="user_id" value="{{ user_id }}">
                <input type="hidden" name="email" value="{{ email }}">
                <input type="hidden" name="otp" id="otp-hidden">

                <div class="flex gap-4">
                    <a href="/auth/forgot-password" class="flex-1 border border-gray-600 hover:border-gray-400 text-gray-300 hover:text-white
                              font-bold py-3.5 rounded-xl transition-colors text-sm text-center">
                        Cancel
                    </a>
                    <button type="submit" id="next-btn" class="flex-1 bg-[#41c2ef] hover:bg-[#41c2ef]/90 active:bg-[#41c2ef]/80 
                                   text-gray-900 font-bold py-3.5 rounded-xl transition-colors 
                                   text-sm disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        Next
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ── OTP Input Auto-Advance ───────────────────────────────────────────────
        const inputs = document.querySelectorAll('.otp-input');
        const nextBtn = document.getElementById('next-btn');
        const hidden = document.getElementById('otp-hidden');

        inputs.forEach((input, i) => {
            input.addEventListener('input', (e) => {
                // Allow only digits
                e.target.value = e.target.value.replace(/\D/g, '');
                if (e.target.value) {
                    e.target.classList.add('filled');
                    if (i < inputs.length - 1) inputs[i + 1].focus();
                } else {
                    e.target.classList.remove('filled');
                }
                updateNextBtn();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && i > 0) {
                    inputs[i - 1].focus();
                    inputs[i - 1].value = '';
                    inputs[i - 1].classList.remove('filled');
                    updateNextBtn();
                }
            });

            // Handle paste
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 5);
                pasted.split('').forEach((char, j) => {
                    if (inputs[j]) {
                        inputs[j].value = char;
                        inputs[j].classList.add('filled');
                    }
                });
                if (inputs[pasted.length - 1]) inputs[pasted.length - 1].focus();
                updateNextBtn();
            });
        });

        function updateNextBtn() {
            const otp = Array.from(inputs).map(i => i.value).join('');
            hidden.value = otp;
            nextBtn.disabled = otp.length !== 5;
        }

        // ── Countdown Timer (10 minutes) ─────────────────────────────────────────
        let totalSeconds = 600; // 10 minutes
        const countdownEl = document.getElementById('countdown');
        const resendBtn = document.getElementById('resend-btn');

        const timer = setInterval(() => {
            totalSeconds--;
            const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            countdownEl.textContent = `${m}:${s}`;

            if (totalSeconds <= 0) {
                clearInterval(timer);
                countdownEl.textContent = '00:00';
                countdownEl.classList.remove('text-[#41c2ef]');
                countdownEl.classList.add('text-red-400');
                resendBtn.disabled = false;
                resendBtn.classList.remove('text-gray-500');
                resendBtn.classList.add('text-[#41c2ef]');
            }
        }, 1000);

        // Focus first input on load
        inputs[0].focus();
    </script>

</body>

</html>
